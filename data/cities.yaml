# questionnaire axis weights (各質問の軸 → タグへのマッピング)
questionnaire:
  q1_distance:
    label: "薬院から何時間くらい移動できる？"
    options:
      - value: local
        label: "日帰り・1時間以内"
        filter: [九州近郊]
      - value: day_trip
        label: "日帰り・1-2時間"
        filter: [九州近郊, 九州中距離]
      - value: overnight
        label: "1泊したい"
        filter: [九州近郊, 九州中距離, 九州遠距離]
      - value: intl
        label: "海外もあり"
        filter: [国際]

  q2_vibe:
    label: "一番やりたいことは？"
    options:
      - value: food
        label: "食べまくる"
        tags_boost: [食, グルメ, ラーメン, お茶]
      - value: nature
        label: "自然の中でぼーっとする"
        tags_boost: [自然, 高原, 静養, 写真]
      - value: culture
        label: "街歩き・歴史・工芸"
        tags_boost: [文化, 街歩き, 歴史, 伝統]
      - value: relax
        label: "温泉・サウナ・のんびり"
        tags_boost: [温泉, 静養, 宿泊]

  q3_companion:
    label: "誰と行く？"
    options:
      - value: solo
        label: "一人"
        note: "個人カフェ探索向き"
      - value: couple
        label: "パートナーと"
        note: "ロマンチックな景観優先"
      - value: friends
        label: "友人と"
        note: "ドライブと賑やかさ重視"
      - value: family
        label: "家族と（子どもあり）"
        note: "体験・農園・広い場所優先"

  q4_must:
    label: "外せない要素は？（キーワードで教えて）"
    type: free_text
    examples: ["パン屋", "温泉", "コーヒー", "お酒", "海", "棚田", "フルーツ"]

  q5_pace:
    label: "旅のペースは？"
    options:
      - value: packed
        label: "朝から晩まで詰め込む"
        timeline_density: high
      - value: relaxed
        label: "カフェでぼーっとする時間も欲しい"
        timeline_density: low
