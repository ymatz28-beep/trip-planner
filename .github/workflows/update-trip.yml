name: Update Trip Plan

on:
  issue_comment:
    types: [created]
  issues:
    types: [labeled]

jobs:
  update:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'update')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      id-token: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          trigger_phrase: "@claude"
          prompt: |
            あなたはtrip-plannerプロジェクトのメンテナーです。
            以下のGitHub Issueの指示に従い、該当HTMLファイルを編集してください。

            ## 指示内容
            タイトル: ${{ github.event.issue.title }}
            本文:
            ${{ github.event.issue.body }}

            ## ルール
            - HANDOFF.md を読んで現状を把握してから編集
            - 該当するHTMLファイル(taipei.html, macau.html, london.html, index.html)を直接編集
            - デザインシステム準拠（Inter/JetBrains Monoフォント、iUMAトークン、コンパクトhero）
            - HANDOFF.md も更新内容に合わせて更新
            - 変更がなければその旨コメント
            - 変更があれば完了後にIssueをcloseする
