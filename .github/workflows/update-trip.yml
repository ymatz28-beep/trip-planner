name: Update Trip Plan

on:
  issues:
    types: [opened, labeled]

jobs:
  update:
    if: contains(github.event.issue.labels.*.name, 'update')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Apply trip plan update
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          label_trigger: "update"
          direct_prompt: |
            あなたはtrip-plannerプロジェクトのメンテナーです。
            以下のGitHub Issueの指示に従い、該当HTMLファイルを編集してください。

            ## ルール
            - HANDOFF.md を読んで現状を把握してから編集
            - 該当するHTMLファイル(taipei.html, macau.html, london.html, index.html)を直接編集
            - デザインシステム準拠（Inter/JetBrains Monoフォント、iUMAトークン、コンパクトhero）
            - HANDOFF.md も更新内容に合わせて更新
            - 編集が終わったら変更内容のサマリをIssueにコメント
