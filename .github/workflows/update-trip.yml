name: Update Trip Plan

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  update:
    if: contains(github.event.issue.labels.*.name, 'update')
    uses: ymatz28-beep/shared-workflows/.github/workflows/claude-issue-handler.yml@main
    with:
      claude_prompt: |
        あなたはtrip-plannerプロジェクトのメンテナーです。
        以下のGitHub Issueの指示に従い、該当HTMLファイルを編集してください。

        ## ルール
        - HANDOFF.md を読んで現状を把握してから編集
        - 該当するHTMLファイル(taipei.html, macau.html, london.html, fukuoka.html, kirishima.html, index.html)を直接編集
        - 新しい店舗やスポットを追加する場合はGoogle Mapsリンク付き
        - デザインシステム準拠（既存HTMLのCSS変数・クラス名をそのまま使う）
        - HANDOFF.md も更新内容に合わせて更新
      success_comment: |
        反映完了 ✅

        https://ymatz28-beep.github.io/trip-planner/

        キャッシュ(10分)のためハードリロード推奨。
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
