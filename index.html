<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>iUMA Travel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

    :root {
      --bg: #0f1117;
      --surface: rgba(255,255,255,0.035);
      --surface-hover: rgba(255,255,255,0.065);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.22);
      --text: #f5f5f7;
      --text-secondary: #a1a1aa;
      --muted: #71717a;
      --dim: #3f3f46;
      --accent: #6366f1;
      --page-accent: #ff6b35;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Shared Gnav ── */
    .site-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 52px;
      background: rgba(22,24,31,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .site-nav { display: flex; gap: 4px; }
    .site-nav a {
      color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 500;
      padding: 6px 14px; border-radius: 6px; transition: background .15s, color .15s;
    }
    .site-nav a:hover, .site-nav a[aria-current="page"] {
      background: var(--surface-hover); color: var(--text);
    }
    .nav-toggle { display: none; }
    .nav-toggle-label { display: none; cursor: pointer; padding: 8px; }
    .nav-toggle-label span,
    .nav-toggle-label span::before,
    .nav-toggle-label span::after {
      display: block; background: var(--text); height: 2px; width: 20px;
      border-radius: 2px; position: relative; transition: .3s;
    }
    .nav-toggle-label span::before,
    .nav-toggle-label span::after { content: ''; position: absolute; }
    .nav-toggle-label span::before { top: -6px; }
    .nav-toggle-label span::after { top: 6px; }
    @media (max-width: 640px) {
      .nav-toggle-label { display: block; }
      .site-nav {
        display: none; flex-direction: column; gap: 0;
        position: absolute; top: 52px; left: 0; right: 0; z-index: 200;
        background: rgba(22,24,31,0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        padding: 8px 0;
      }
      .site-nav a { padding: 12px 24px; border-radius: 0; font-size: 14px; }
      .nav-toggle:checked ~ .site-nav { display: flex; }
      .nav-toggle:checked ~ .nav-toggle-label span { background: transparent; }
      .nav-toggle:checked ~ .nav-toggle-label span::before { top: 0; transform: rotate(45deg); }
      .nav-toggle:checked ~ .nav-toggle-label span::after { top: 0; transform: rotate(-45deg); }
    }

    /* ── Page Layout ── */
    .page { max-width: 720px; margin: 0 auto; padding: 24px 20px 60px; }

    .page-header {
      margin-bottom: 20px;
    }
    .page-header h1 {
      font-size: clamp(20px, 2.5vw, 26px);
      font-weight: 700; letter-spacing: -0.02em;
    }
    .page-sub {
      font-size: 12px; color: var(--muted);
      margin-top: 4px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── Section ── */
    .section { margin-bottom: 32px; }
    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 10px;
      padding: 0 4px;
    }

    /* ── Next Trip Hero ── */
    .next-card {
      display: flex; flex-direction: column;
      text-decoration: none; color: var(--text);
      background: linear-gradient(135deg, rgba(255,107,53,0.08), rgba(255,107,53,0.02));
      border: 1px solid rgba(255,107,53,0.25);
      border-radius: 12px;
      padding: 18px 20px;
      transition: all 0.2s;
      position: relative; overflow: hidden;
    }
    .next-card:hover {
      border-color: rgba(255,107,53,0.5);
      transform: translateY(-2px);
    }
    .next-row1 {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .next-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
      color: var(--page-accent);
    }
    .next-countdown {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 600;
      background: rgba(255,107,53,0.15);
      color: var(--page-accent);
      padding: 4px 10px; border-radius: 12px;
    }
    .next-row2 {
      display: flex; align-items: baseline; gap: 10px;
      margin-bottom: 6px;
    }
    .next-flag { font-size: 22px; line-height: 1; }
    .next-title { font-size: 19px; font-weight: 700; }
    .next-meta {
      font-size: 12px; color: var(--text-secondary);
      padding-left: 32px;
    }
    .next-booking {
      margin-top: 10px; padding: 10px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: grid; grid-template-columns: auto 1fr;
      gap: 4px 12px;
      font-size: 11.5px;
      color: var(--text-secondary);
    }
    .next-booking dt {
      color: var(--page-accent); font-weight: 600;
      font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
      align-self: center;
    }
    .next-booking dd {
      margin: 0; font-family: 'JetBrains Mono', monospace;
      color: var(--text); font-size: 12px;
      word-break: break-all;
    }

    /* ── List Row ── */
    .trips-list { display: flex; flex-direction: column; }
    .trip-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 12px 12px 4px;
      text-decoration: none; color: var(--text);
      border-bottom: 1px solid var(--border);
      transition: background 0.15s, padding-left 0.2s;
      min-height: 56px;
    }
    .trip-row:hover {
      background: var(--surface-hover);
      padding-left: 8px;
    }
    .trip-row:last-child { border-bottom: none; }
    .row-flag {
      font-size: 18px; line-height: 1;
      flex-shrink: 0; width: 24px; text-align: center;
    }
    .row-body {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 2px;
    }
    .row-title {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .row-meta {
      font-size: 11px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .row-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--muted);
      flex-shrink: 0;
    }
    .row-arrow {
      color: var(--dim); font-size: 14px;
      flex-shrink: 0;
      transition: color 0.15s, transform 0.2s;
    }
    .trip-row:hover .row-arrow {
      color: var(--text-secondary); transform: translateX(2px);
    }

    /* archived row */
    .trip-row.archived { opacity: 0.55; }
    .trip-row.archived:hover { opacity: 0.85; }
    .trip-row.cancelled { opacity: 0.4; }
    .trip-row.cancelled .row-title { text-decoration: line-through; text-decoration-color: var(--dim); }

    /* ── Year accordion ── */
    .year-group {
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .year-toggle {
      width: 100%;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: transparent; border: none; color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .year-toggle:hover { background: var(--surface-hover); }
    .year-toggle .chevron {
      color: var(--muted); font-size: 12px;
      transition: transform 0.2s;
    }
    .year-toggle.open .chevron { transform: rotate(90deg); }
    .year-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--muted);
      margin-left: auto; margin-right: 12px;
    }
    .year-content {
      max-height: 0; overflow: hidden;
      transition: max-height 0.3s ease;
      border-top: 1px solid var(--border);
    }
    .year-content.open { max-height: 2000px; }

    /* ── Footer ── */
    footer {
      margin-top: 40px; padding: 20px 4px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between;
      font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--dim);
    }

    @media (max-width: 640px) {
      .page { padding: 16px 12px 40px; }
    }
  </style>
</head>
<body>
<header class="site-header">
  <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation">
  <label for="nav-toggle" class="nav-toggle-label"><span></span></label>
  <nav class="site-nav">
    <a href="https://ymatz28-beep.github.io/report-dashboard/">Hub</a>
    <a href="https://ymatz28-beep.github.io/property-report/">Property</a>
    <a href="https://ymatz28-beep.github.io/trip-planner/" aria-current="page">Travel</a>
  </nav>
</header>

<div class="page">
  <div class="page-header">
    <h1>Travel</h1>
    <p class="page-sub">旅行プラン</p>
  </div>

  <div id="content"></div>

  <footer>
    <div>iUMA TRAVEL — 2026</div>
    <div>TRIP PLANNER</div>
  </footer>
</div>

<script>
  var TRIPS = [
    {
      flag: "🇹🇼",
      title: "Taipei 2026",
      meta: "2名 · Food × LGBTQ+ × 夜市",
      date: "4/16–20",
      startDate: "2026-04-16",
      url: "taipei.html",
      status: "next",
      endDate: "2026-04-20",
      booking: {
        flight: "EVA Air BR191/190 羽田↔台北松山",
        outbound: "4/16(木) 12:40 HND → 15:05 TSA",
        inbound: "4/20(月) 16:20 TSA → 20:20 HND",
        agodaId: "1707813388",
        pnr: "FD79EM",
        hotel: "相鉄グランドフレッサ 台北西門（4泊・朝食付）"
      }
    },
    {
      flag: "🇯🇵",
      title: "Fukuoka",
      meta: "ローカルガイド · 温泉 × グルメ",
      date: "通年",
      url: "fukuoka.html",
      status: "guide"
    },
    {
      flag: "🇯🇵",
      title: "界 霧島 2026",
      meta: "1名 · 温泉×3 · 霧島神宮 · 神話",
      date: "4/9",
      year: 2026,
      url: "kirishima.html",
      status: "completed"
    },
    {
      flag: "🇲🇴",
      title: "Macau 2026",
      meta: "4名 · Family · ホテル × カジノ",
      date: "3/5–10",
      year: 2026,
      url: "macau.html",
      status: "completed"
    },
    {
      flag: "🇬🇧",
      title: "London 2026",
      meta: "中東リスクのため中止",
      date: "—",
      year: 2026,
      url: "london.html",
      status: "cancelled"
    }
  ];

  function daysUntil(dateStr) {
    var target = new Date(dateStr + "T00:00:00+09:00");
    var now = new Date();
    var diff = Math.ceil((target - now) / (1000 * 60 * 60 * 24));
    return diff;
  }

  function renderNext(t) {
    var days = daysUntil(t.startDate);
    var countdown = days > 0 ? "あと " + days + " 日" : days === 0 ? "今日出発" : "進行中";
    return '' +
      '<a href="' + t.url + '" class="next-card">' +
        '<div class="next-row1">' +
          '<span class="next-badge">NEXT TRIP</span>' +
          '<span class="next-countdown">' + countdown + '</span>' +
        '</div>' +
        '<div class="next-row2">' +
          '<span class="next-flag">' + t.flag + '</span>' +
          '<span class="next-title">' + t.title + '</span>' +
        '</div>' +
        '<div class="next-meta">' + t.date + ' · ' + t.meta + '</div>' +
        (t.booking ? renderBooking(t.booking) : '') +
      '</a>';
  }

  function renderBooking(b) {
    var rows = [];
    if (b.flight)    rows.push(['Flight',   b.flight]);
    if (b.outbound)  rows.push(['Outbound', b.outbound]);
    if (b.inbound)   rows.push(['Inbound',  b.inbound]);
    if (b.agodaId)   rows.push(['Agoda ID', b.agodaId]);
    if (b.pnr)       rows.push(['PNR',      b.pnr]);
    if (b.hotel)     rows.push(['Hotel',    b.hotel]);
    return '<dl class="next-booking">' + rows.map(function(r) {
      return '<dt>' + r[0] + '</dt><dd>' + r[1] + '</dd>';
    }).join('') + '</dl>';
  }

  function renderRow(t) {
    var cls = "trip-row";
    if (t.status === "completed") cls += " archived";
    if (t.status === "cancelled") cls += " cancelled";
    return '' +
      '<a href="' + t.url + '" class="' + cls + '">' +
        '<span class="row-flag">' + t.flag + '</span>' +
        '<div class="row-body">' +
          '<div class="row-title">' + t.title + '</div>' +
          '<div class="row-meta">' + t.meta + '</div>' +
        '</div>' +
        '<span class="row-date">' + t.date + '</span>' +
        '<span class="row-arrow">→</span>' +
      '</a>';
  }

  function render() {
    var container = document.getElementById("content");
    var html = '';

    // Auto-promote "next" trips past their endDate to "completed" (strip booking noise after return)
    var today = new Date(); today.setHours(0,0,0,0);
    TRIPS.forEach(function(t) {
      if (t.status === "next" && t.endDate && new Date(t.endDate) < today) {
        t.status = "completed";
        delete t.booking;
      }
    });

    var next = TRIPS.find(function(t) { return t.status === "next"; });
    var guides = TRIPS.filter(function(t) { return t.status === "guide"; });
    var past = TRIPS.filter(function(t) { return t.status === "completed" || t.status === "cancelled"; });

    // Next Trip
    if (next) {
      html += '<div class="section">' + renderNext(next) + '</div>';
    }

    // Guides
    if (guides.length > 0) {
      html += '<div class="section">';
      html += '<div class="section-label">Guides</div>';
      html += '<div class="trips-list">';
      guides.forEach(function(t) { html += renderRow(t); });
      html += '</div></div>';
    }

    // Past trips grouped by year
    if (past.length > 0) {
      var byYear = {};
      past.forEach(function(t) {
        var y = t.year || "Other";
        if (!byYear[y]) byYear[y] = [];
        byYear[y].push(t);
      });
      var years = Object.keys(byYear).sort(function(a, b) { return b - a; });

      html += '<div class="section">';
      html += '<div class="section-label">Past Trips</div>';
      years.forEach(function(y, i) {
        var trips = byYear[y];
        var openCls = i === 0 ? ' open' : '';
        html += '<div class="year-group">';
        html += '<button class="year-toggle' + openCls + '" onclick="toggleYear(this)">';
        html += '<span>' + y + '</span>';
        html += '<span class="year-count">' + trips.length + ' trips</span>';
        html += '<span class="chevron">›</span>';
        html += '</button>';
        html += '<div class="year-content' + openCls + '">';
        html += '<div class="trips-list">';
        trips.forEach(function(t) { html += renderRow(t); });
        html += '</div></div></div>';
      });
      html += '</div>';
    }

    container.innerHTML = html;
  }

  function toggleYear(btn) {
    btn.classList.toggle('open');
    btn.nextElementSibling.classList.toggle('open');
  }

  render();
</script>
</body>
</html>
