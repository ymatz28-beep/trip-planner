<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>iUMA Travel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: rgba(255,255,255,0.035);
      --surface-hover: rgba(255,255,255,0.065);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.22);
      --text: #f5f5f7;
      --text-secondary: #a1a1aa;
      --muted: #71717a;
      --dim: #3f3f46;
      --accent: #6366f1;
      --page-accent: #ff6b35;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Shared Gnav ── */
    .site-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 52px;
      background: rgba(22,24,31,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: sticky; top: 0; z-index: 100;
    }
    .site-nav { display: flex; gap: 4px; }
    .site-nav a {
      color: #71717a; text-decoration: none; font-size: 13px; font-weight: 500;
      padding: 6px 14px; border-radius: 6px; transition: background .15s, color .15s;
    }
    .site-nav a:hover, .site-nav a[aria-current="page"] {
      background: rgba(255,255,255,0.065); color: #f5f5f7;
    }
    .nav-toggle { display: none; }
    .nav-toggle-label { display: none; cursor: pointer; padding: 8px; }
    .nav-toggle-label span,
    .nav-toggle-label span::before,
    .nav-toggle-label span::after {
      display: block; background: #f5f5f7; height: 2px; width: 20px;
      border-radius: 2px; position: relative; transition: .3s;
    }
    .nav-toggle-label span::before,
    .nav-toggle-label span::after { content: ''; position: absolute; }
    .nav-toggle-label span::before { top: -6px; }
    .nav-toggle-label span::after { top: 6px; }
    @media (max-width: 640px) {
      .nav-toggle-label { display: block; }
      .site-nav {
        display: none; flex-direction: column; gap: 0;
        position: absolute; top: 52px; left: 0; right: 0; z-index: 200;
        background: rgba(22,24,31,0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255,255,255,0.08);
        padding: 8px 0;
      }
      .site-nav a { padding: 12px 24px; border-radius: 0; font-size: 14px; }
      .nav-toggle:checked ~ .site-nav { display: flex; }
      .nav-toggle:checked ~ .nav-toggle-label span { background: transparent; }
      .nav-toggle:checked ~ .nav-toggle-label span::before { top: 0; transform: rotate(45deg); }
      .nav-toggle:checked ~ .nav-toggle-label span::after { top: 0; transform: rotate(-45deg); }
    }

    /* ── Page Layout ── */
    .page { max-width: 1100px; margin: 0 auto; padding: 0 32px 80px; }

    .page-header {
      padding: 32px 0 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
      opacity: 0; animation: reveal 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .page-header h1 {
      font-family: 'Inter', sans-serif;
      font-size: clamp(20px, 2.5vw, 26px);
      font-weight: 700; letter-spacing: -0.02em;
      color: var(--text);
    }
    .page-sub {
      font-size: 13px; color: var(--muted);
      margin-top: 4px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.03em;
    }

    /* ── Grid ── */
    .trips-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    /* ── Card ── */
    .trip-card {
      display: flex; flex-direction: column;
      text-decoration: none; color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      transition: border-color 0.2s, transform 0.2s, background 0.2s;
      opacity: 0;
    }
    .trip-card.v { animation: cardReveal 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
    .trip-card:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
      transform: translateY(-2px);
    }

    /* "Next Trip" accent */
    .trip-card.next {
      border-left: 3px solid var(--page-accent);
    }

    /* Archived */
    .trip-card.archived { opacity: 0; }
    .trip-card.archived.v { animation: cardReveal 0.5s cubic-bezier(0.16,1,0.3,1) forwards; filter: opacity(0.4); }
    .trip-card.archived:hover { filter: opacity(0.65); }

    .card-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 10px;
    }
    .trip-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--page-accent);
    }
    .trip-card.archived .trip-label { color: var(--muted); }

    .trip-arrow {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid var(--border);
      display: grid; place-items: center;
      font-size: 14px; color: var(--muted);
      transition: all 0.25s;
      flex-shrink: 0;
    }
    .trip-card:hover .trip-arrow {
      background: var(--page-accent); border-color: var(--page-accent);
      color: var(--bg); transform: translateX(2px);
    }
    .trip-card.archived:hover .trip-arrow {
      background: var(--muted); border-color: var(--muted); color: var(--bg);
    }

    .trip-title {
      font-family: 'Inter', sans-serif;
      font-size: 18px; font-weight: 700; line-height: 1.25;
      margin-bottom: 8px;
    }
    .trip-desc {
      font-size: 13px; color: var(--text-secondary); line-height: 1.65;
      flex: 1;
    }

    .trip-tags {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 14px;
    }
    .trip-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; font-weight: 500;
      padding: 3px 9px; border-radius: 5px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      color: var(--text-secondary);
    }

    /* ── Footer ── */
    footer {
      margin-top: 48px; padding: 24px 0;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .foot-left, .foot-right {
      font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--dim);
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .page { padding: 0 16px 60px; }
      .trips-grid { grid-template-columns: 1fr; }
      footer { flex-direction: column; gap: 12px; align-items: flex-start; }
    }
  </style>
</head>
<body>
<header class="site-header">
  <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation">
  <label for="nav-toggle" class="nav-toggle-label"><span></span></label>
  <nav class="site-nav">
    <a href="https://ymatz28-beep.github.io/report-dashboard/">Hub</a>
    <a href="https://ymatz28-beep.github.io/property-report/">Property</a>
    <a href="https://ymatz28-beep.github.io/trip-planner/" aria-current="page">Travel</a>
  </nav>
</header>

<div class="page">
  <div class="page-header">
    <h1>Travel</h1>
    <p class="page-sub">旅行プラン一覧</p>
  </div>

  <div class="trips-grid" id="trips"></div>

  <footer>
    <div class="foot-left">iUMA TRAVEL &mdash; 2026</div>
    <div class="foot-right">TRIP PLANNER</div>
  </footer>
</div>

<script>
  var TRIPS = [
    {
      label: "Next Trip",
      title: "Taipei 2026",
      desc: "飲茶 × LGBTQ+ × 夜市 × 烏龍茶。4泊5日の食い倒れ旅（Yuma + 大木くん）。",
      tags: ["4/16\u201320", "2\u540D", "Food \u00d7 LGBTQ+"],
      url: "taipei.html",
      next: true
    },
    {
      label: "Local Guide",
      title: "Fukuoka",
      desc: "福岡ローカルガイド。温泉・サウナ・グルメ・エリア別おすすめ。ふくの湯3店舗情報あり。",
      tags: ["2拠点生活", "温泉 \u00d7 グルメ", "Local"],
      url: "fukuoka.html"
    },
    {
      label: "Completed",
      title: "界 霧島 2026",
      desc: "Hoshino Resorts KAI Kirishima。温泉×3回・霧島神宮・黒酢ランチ・神話の舞。",
      tags: ["4/9", "1名", "温泉 × 神話"],
      url: "kirishima.html",
      archived: true
    },
    {
      label: "Completed",
      title: "Macau 2026",
      desc: "家族4人でマカオを5泊6日。ホテル・カジノ・グルメを満喫。",
      tags: ["3/5\u201310", "4\u540D", "Family"],
      url: "macau.html",
      archived: true
    },
    {
      label: "Cancelled",
      title: "London 2026",
      desc: "\u4E2D\u6771\u30EA\u30B9\u30AF\u306E\u305F\u3081\u4E2D\u6B62\u3002",
      tags: ["Cancelled"],
      url: "london.html",
      archived: true
    }
  ];

  function render() {
    var container = document.getElementById("trips");
    var cards = [];

    TRIPS.forEach(function(t) {
      var el = document.createElement("a");
      el.href = t.url;
      var cls = "trip-card";
      if (t.next) cls += " next";
      if (t.archived) cls += " archived";
      el.className = cls;

      var tagsHtml = (t.tags || []).map(function(tag) {
        return '<span class="trip-tag">' + tag + '</span>';
      }).join("");

      el.innerHTML =
        '<div class="card-top">' +
          '<span class="trip-label">' + t.label + '</span>' +
          '<div class="trip-arrow">\u2192</div>' +
        '</div>' +
        '<div class="trip-title">' + t.title + '</div>' +
        '<div class="trip-desc">' + t.desc + '</div>' +
        (tagsHtml ? '<div class="trip-tags">' + tagsHtml + '</div>' : '');

      cards.push(el);
      container.appendChild(el);
    });

    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        cards.forEach(function(el, i) {
          setTimeout(function() { el.classList.add("v"); }, 80 + i * 80);
        });
      });
    });
  }

  render();
</script>
</body>
</html>
